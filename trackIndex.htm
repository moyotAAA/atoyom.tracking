<script type="text/javascript">
    function initCode() {

        var code = document.getElementById('codes').value;
        if (code != null) {
            document.getElementById('cno').value = code;
        }
    }

    initCode();

    function selectFile(file_path) {
        var fileDialog = true;
        var arr = file_path.split(';');
        var tableBody = $('#fileBody tbody');
        tableBody.empty();
        var tar = '<tr height="120px;">';
        for (var index = 0; index < arr.length; index++) {
            if (arr[index].indexOf("pdf") != -1) {
                window.open(arr[index]);
                fileDialog = false;
                break;
            }
            if ((index + 1) % 3 == 0 && index != 0) {
                tar += '</tr><tr height="120px;">';
            }
            tar += '<td width="30%;" align="center"><img src="' + arr[index] + '" width="120px;" height="100px;" /></td>';
        }
        tar += '</tr>';
        tableBody.append(tar);
        if (fileDialog) {
            $("#fileDialog").removeClass("hide");
        }
    }

    function fileCloseDailog() {
        $("#fileDialog").addClass("hide");
    }

    function downloadTrackFile(businessId) {
        window.open("/downloadTrackFile.htm?businessId=" + businessId);
    }
